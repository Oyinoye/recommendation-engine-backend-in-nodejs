services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: segment_context
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:482.0.0-emulators
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085 --project=test-project
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 5s
      timeout: 1s
      retries: 1

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: segment_context
      DB_USER: postgres
      DB_PASSWORD: password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GCP_PROJECT_ID: test-project
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      MOCK_PUBSUB: "false"
      USE_MOCK_VERTEX: "true"
      DEFAULT_TENANT_ID: dev-tenant
      FRONTEND_URL: http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pubsub-emulator:
        condition: service_started
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - /app/node_modules

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    command: ["npm", "run", "worker"]
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: segment_context
      DB_USER: postgres
      DB_PASSWORD: password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GCP_PROJECT_ID: test-project
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      MOCK_PUBSUB: "false"
      USE_MOCK_VERTEX: "true"
      WORKER_CONCURRENCY: "5"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pubsub-emulator:
        condition: service_started
    volumes:
      - ./src:/app/src
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
